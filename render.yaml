services:
  - type: web
    name: taskflow-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: HEAD_USERNAME
        value: head
      - key: HEAD_PASSWORD
        sync: false
      - key: HEAD_NAME
        value: Global Head
      - key: POLLING_MINUTES
        value: 1
